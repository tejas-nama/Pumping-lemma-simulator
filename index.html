<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pumping Lemma Visualizer</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #07090f;
      --bg2:       #0c1020;
      --bg3:       #111827;
      --border:    #1a2540;
      --border2:   #243050;
      --text:      #c6d4f0;
      --text2:     #5a789c;
      --text3:     #384e6a;
      --accent:    #4a8fff;
      --accent2:   #1a3a6a;
      --orange:    #f4a05a;
      --green:     #4ecf7a;
      --green-bg:  #071410;
      --red:       #e05555;
      --red-bg:    #1a0808;
      --mono:      'JetBrains Mono', monospace;
      --display:   'Syne', sans-serif;
    }

    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--mono); min-height: 100vh; line-height: 1.6; }

    /* ── Header ── */
    header {
      background: var(--bg2); border-bottom: 1px solid var(--border);
      padding: 28px 40px 22px; position: sticky; top: 0; z-index: 100;
    }
    .header-eyebrow { font-size: 10px; letter-spacing: 4px; color: var(--text3); text-transform: uppercase; margin-bottom: 6px; }
    header h1 { font-family: var(--display); font-size: 24px; color: #e8f2ff; letter-spacing: -0.5px; }
    header p  { font-size: 12px; color: var(--text2); margin-top: 4px; }

    /* ── Layout ── */
    .container { max-width: 880px; margin: 0 auto; padding: 32px 24px 80px; }

    /* ── Mode tabs ── */
    .mode-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .mode-tab {
      padding: 9px 20px; border: 1px solid var(--border); background: transparent;
      color: var(--text3); border-radius: 6px; cursor: pointer; font-family: var(--mono);
      font-size: 11px; letter-spacing: 1px; text-transform: uppercase; transition: all 0.2s;
    }
    .mode-tab.active { border-color: var(--accent); background: var(--accent2); color: var(--accent); }
    .mode-tab:hover:not(.active) { border-color: var(--border2); color: var(--text2); }

    /* ── Language chips ── */
    .section-label { font-size: 10px; letter-spacing: 3px; color: var(--text3); text-transform: uppercase; margin-bottom: 10px; }
    .lang-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
    .lang-chip {
      padding: 8px 14px; border: 1px solid var(--border); background: transparent;
      color: var(--text3); border-radius: 6px; cursor: pointer; font-family: var(--mono);
      font-size: 12px; transition: all 0.2s;
    }
    .lang-chip:hover { border-color: var(--border2); color: var(--text2); }
    .lang-chip.active-not { border-color: var(--red);   background: var(--red-bg);   color: var(--red); }
    .lang-chip.active-yes { border-color: var(--green); background: var(--green-bg); color: var(--green); }

    /* ── Controls row ── */
    .controls-row { display: flex; align-items: center; gap: 20px; margin-bottom: 28px; flex-wrap: wrap; }
    .ctrl-label { font-size: 12px; color: var(--text3); }
    input[type=range] {
      -webkit-appearance: none; height: 4px; background: var(--border2);
      border-radius: 2px; outline: none; width: 160px; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px;
      border-radius: 50%; background: var(--accent); cursor: pointer;
    }
    .ctrl-val { font-size: 16px; color: var(--accent); min-width: 20px; }
    .base-preview { font-size: 13px; color: var(--text2); }
    .base-preview code { background: var(--bg3); color: var(--text); padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border); }

    /* ── Step bar ── */
    .step-bar { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 24px; }
    .step-item {
      flex: 1; padding: 10px 4px; text-align: center; font-size: 10px; letter-spacing: 0.5px;
      background: var(--bg2); color: var(--text3); border-right: 1px solid var(--border);
      cursor: pointer; transition: all 0.2s; user-select: none;
    }
    .step-item:last-child { border-right: none; }
    .step-item.done    { background: var(--bg3); color: var(--accent); }
    .step-item.current { background: #0d1f3a;   color: var(--text); }
    .step-item:hover   { background: var(--bg3); }

    /* ── Panel ── */
    .panel { border: 1px solid var(--border); border-radius: 10px; background: var(--bg2); overflow: hidden; margin-bottom: 20px; animation: fadeUp 0.3s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .panel-inner { padding: 28px; }
    .step-tag { font-size: 10px; letter-spacing: 3px; color: var(--text3); text-transform: uppercase; margin-bottom: 14px; }
    .panel h2 { font-family: var(--display); font-size: 20px; color: #e8f2ff; margin-bottom: 14px; }
    .panel p  { font-size: 13px; color: var(--text2); line-height: 1.8; margin-bottom: 14px; }

    /* ── Theorem ── */
    .theorem-box { background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; padding: 18px 20px; margin-bottom: 18px; line-height: 1.9; font-size: 13px; }
    .theorem-box .t-head { color: var(--accent); margin-bottom: 10px; }
    .theorem-box .indent { padding-left: 14px; border-left: 2px solid var(--accent2); color: #8aaad0; margin-bottom: 10px; }
    .theorem-box ul { margin: 8px 0; padding-left: 24px; color: #8aaad0; }
    .theorem-box li { margin-bottom: 4px; }
    .tip-box { font-size: 12px; color: var(--text2); background: var(--bg3); border-left: 3px solid var(--border2); padding: 10px 14px; border-radius: 0 6px 6px 0; }
    .hl-o { color: #f4a05a; font-weight: 600; }
    .hl-b { color: var(--accent); }
    .hl-w { color: #e8f2ff; }

    /* ── String display ── */
    .string-display { display: flex; flex-wrap: wrap; gap: 3px; padding: 12px 14px; background: var(--bg3); border-radius: 8px; border: 1px solid var(--border); margin-bottom: 12px; min-height: 52px; }
    .char-cell {
      display: inline-flex; align-items: center; justify-content: center;
      width: 28px; height: 32px; background: #131f35; border-radius: 4px;
      font-weight: 700; font-size: 14px; border: 1px solid var(--border); transition: all 0.3s;
    }
    .ca { color: #7fb3ff; } .cb { color: #f4a05a; } .cc { color: #4ecf7a; } .cd { color: #c98fff; }

    /* ── Decompose segment coloring ── */
    .s-x  { background: #0d1e38 !important; border-color: #1e3a6a !important; }
    .s-y  { background: #221006 !important; border-color: #5c2d0a !important; }
    .s-u  { background: #0d1e38 !important; border-color: #1e3a6a !important; }
    .s-v  { background: #221006 !important; border-color: #5c2d0a !important; }
    .s-xi { background: #081a10 !important; border-color: #0e3020 !important; }
    .s-yi { background: #221006 !important; border-color: #5c2d0a !important; }
    .s-z  { background: #0d1e38 !important; border-color: #1e3a6a !important; }

    /* ── Legend pills ── */
    .decomp-legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
    .leg-pill { display: flex; align-items: center; gap: 8px; padding: 6px 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.05); font-size: 12px; }
    .leg-pill .pk { font-weight: 700; font-size: 13px; }
    .leg-pill .pv { color: #5a7aaa; }
    .lx  { background: #0d1e38; } .lx  .pk { color: #7fb3ff; }
    .ly  { background: #221006; } .ly  .pk { color: #f4a05a; }
    .lu  { background: #0d1e38; } .lu  .pk { color: #7fb3ff; }
    .lv  { background: #221006; } .lv  .pk { color: #f4a05a; }
    .lxi { background: #081a10; } .lxi .pk { color: #4ecf7a; }
    .lyi { background: #221006; } .lyi .pk { color: #f4a05a; }
    .lz  { background: #0d1e38; } .lz  .pk { color: #7fb3ff; }
    .proof-hint { background: var(--bg3); border-radius: 8px; padding: 14px 16px; font-size: 13px; color: var(--text2); line-height: 1.7; border: 1px solid var(--border); }

    /* ── Pump step ── */
    .pump-i-row { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
    .i-btn {
      width: 38px; height: 38px; border-radius: 6px; border: 1px solid var(--border);
      background: transparent; color: var(--text3); cursor: pointer;
      font-family: var(--mono); font-size: 14px; font-weight: 700; transition: all 0.15s;
    }
    .i-btn.active { border-color: var(--accent); background: var(--accent2); color: var(--accent); }
    .i-btn:hover:not(.active) { border-color: var(--border2); color: var(--text2); }
    .pump-formula { font-size: 13px; color: var(--text2); margin-bottom: 16px; }
    .verdict-badge { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 8px; font-size: 14px; font-weight: 700; margin-top: 14px; }
    .badge-in  { background: var(--green-bg); border: 1px solid #2a6a3a; color: var(--green); }
    .badge-out { background: var(--red-bg);   border: 1px solid #6a2a2a; color: var(--red); }

    /* ── Verdict ── */
    .verdict-card { border-radius: 10px; padding: 22px; margin-bottom: 18px; }
    .verdict-card.not-lang { background: #070d1a; border: 2px solid var(--accent); }
    .verdict-card.is-lang  { background: var(--green-bg); border: 2px solid #2a6a3a; }
    .verdict-title { font-family: var(--display); font-size: 20px; margin-bottom: 12px; }
    .not-lang .verdict-title { color: var(--accent); }
    .is-lang  .verdict-title { color: var(--green); }
    .verdict-card p { font-size: 13px; color: var(--text2); line-height: 1.8; margin: 0; }
    .proof-summary { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 18px 20px; }
    .proof-summary ol { padding-left: 22px; color: var(--text2); font-size: 13px; line-height: 2.1; }
    .proof-qed { margin-top: 14px; font-size: 13px; color: var(--text3); border-top: 1px solid var(--border); padding-top: 12px; }
    .proof-qed strong { color: var(--accent); }

    /* ── Str info ── */
    .str-info { display: flex; gap: 18px; font-size: 13px; margin-bottom: 4px; flex-wrap: wrap; }
    .si-len { color: var(--accent); } .si-p { color: var(--text2); }
    .si-ok  { color: var(--green); } .si-bad { color: var(--red); }

    /* ── Nav ── */
    .nav-row { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
    .btn { padding: 10px 22px; border-radius: 6px; cursor: pointer; font-family: var(--mono); font-size: 13px; transition: all 0.15s; border: 1px solid; }
    .btn-ghost   { background: transparent; border-color: var(--border); color: var(--text2); }
    .btn-ghost:hover   { border-color: var(--border2); color: var(--text); }
    .btn-primary { background: var(--accent2); border-color: var(--accent); color: var(--accent); }
    .btn-primary:hover { background: #1e3c70; }

    @media(max-width:600px) {
      header { padding: 18px 16px; }
      .container { padding: 20px 12px 60px; }
      .panel-inner { padding: 18px; }
      .step-item { font-size: 9px; padding: 8px 2px; }
      header h1 { font-size: 19px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-eyebrow">Theory of Computation</div>
  <h1>Pumping Lemma Visualizer</h1>
  <p>Interactive proof that certain languages are not regular / context-free</p>
</header>

<div class="container">

  <div class="mode-tabs">
    <button class="mode-tab active" data-mode="regular" onclick="setMode('regular')">Regular Languages</button>
    <button class="mode-tab"        data-mode="cf"      onclick="setMode('cf')">Context-Free Languages</button>
  </div>

  <div class="section-label">Select language</div>
  <div class="lang-chips" id="lang-chips"></div>

  <div class="controls-row">
    <span class="ctrl-label">n =</span>
    <input type="range" id="n-slider" min="2" max="8" value="5" oninput="setN(this.value)"/>
    <span class="ctrl-val" id="n-val">5</span>
    <span class="base-preview">→ <code id="base-str-preview"></code></span>
  </div>

  <div class="step-bar" id="step-bar"></div>

  <div class="panel" id="main-panel">
    <div class="panel-inner" id="panel-content"></div>
  </div>

  <div class="nav-row">
    <button class="btn btn-ghost"   onclick="resetAll()">↺ Reset</button>
    <button class="btn btn-primary" id="next-btn" onclick="nextStep()">Next →</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
